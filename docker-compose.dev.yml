version: '3.9'

# Usage:
#   docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
#
# This override mounts source code for hot reload and exposes debug ports.

services:

  backend:
    build:
      target: deps          # Stop before production build
    command: npm run dev
    volumes:
      - ./backend/src:/app/src
      - ./backend/prisma:/app/prisma
      - ./shared:/shared
    environment:
      NODE_ENV: development
      LOG_QUERIES: "true"
    ports:
      - "3001:3001"
      - "9229:9229"         # Node debugger

  worker:
    build:
      target: deps
    command: npm run worker
    volumes:
      - ./backend/src:/app/src
      - ./shared:/shared
    environment:
      NODE_ENV: development

  frontend:
    build: null
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
      - ./shared:/shared
    environment:
      VITE_API_URL: http://localhost:3001/api
    ports:
      - "5173:5173"
