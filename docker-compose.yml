version: '3.9'

# ─── Networks ─────────────────────────────────────────────────────────────────
networks:
  adflow:
    driver: bridge

# ─── Volumes ──────────────────────────────────────────────────────────────────
volumes:
  postgres_data:
  redis_data:

# ─── Services ─────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: adflow
      POSTGRES_PASSWORD: adflow_secret
      POSTGRES_DB: adflow
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks: [adflow]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adflow"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks: [adflow]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Backend API ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: runner
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://adflow:adflow_secret@postgres:5432/adflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - "3001:3001"
    networks: [adflow]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── Background worker ────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
      target: runner
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://adflow:adflow_secret@postgres:5432/adflow
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    networks: [adflow]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_healthy

  # ── Migrate (runs once then exits) ───────────────────────────────────────────
  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: builder
    command: sh -c "npx prisma migrate deploy && npx prisma db seed"
    env_file: ./backend/.env
    environment:
      DATABASE_URL: postgresql://adflow:adflow_secret@postgres:5432/adflow
    networks: [adflow]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  # ── Frontend ─────────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    restart: unless-stopped
    ports:
      - "80:80"
    networks: [adflow]
    depends_on:
      backend:
        condition: service_healthy

# ─── Development override: use docker-compose.dev.yml ─────────────────────────
# docker-compose -f docker-compose.yml -f docker-compose.dev.yml up
